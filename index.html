<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TBC Serve Manager</title>
    
    <script src="scheduler.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        slate: { 50: '#F8FAFC', 100: '#F1F5F9', 200: '#E2E8F0', 500: '#64748B', 700: '#334155', 900: '#0F172A' },
                        indigo: { 50: '#EEF2FF', 100: '#E0E7FF', 500: '#6366F1', 600: '#4F46E5', 900: '#312E81' },
                        violet: { 600: '#7C3AED' },
                        emerald: { 500: '#10B981' }
                    },
                    boxShadow: {
                        'corporate-base': '0 4px 20px -2px rgba(79, 70, 229, 0.1)',
                        'corporate-hover': '0 10px 25px -5px rgba(79, 70, 229, 0.15), 0 8px 10px -6px rgba(79, 70, 229, 0.1)',
                        'corporate-btn': '0 4px 14px 0 rgba(79, 70, 229, 0.3)',
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react,react-dom",
            "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
        }
    }
    </script>

    <style type="text/tailwindcss">
        body { background-color: #F8FAFC; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        
        .corporate-card { @apply bg-white rounded-xl border border-slate-100 transition-all duration-300 ease-out shadow-corporate-base; }
        .corporate-card:hover { @apply -translate-y-1 shadow-corporate-hover; transform-style: preserve-3d; }
        .corporate-btn { @apply bg-gradient-to-r from-indigo-600 to-violet-600 text-white rounded-lg transition-all duration-200 font-semibold shadow-corporate-btn; }
        .corporate-btn:hover { @apply -translate-y-0.5; box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4); }
        .corporate-input { @apply bg-white border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all; }
        
        .bg-blob { position: fixed; border-radius: 50%; filter: blur(100px); z-index: 0; pointer-events: none; }
        .bg-blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: linear-gradient(to right, rgba(79,70,229,0.15), rgba(124,58,237,0.1)); }
        .bg-blob-2 { bottom: -10%; right: -10%; width: 40vw; height: 40vw; background: linear-gradient(to right, rgba(124,58,237,0.1), rgba(16,185,129,0.05)); }

        .schedule-table th { @apply px-3 py-4 bg-slate-50 text-slate-500 text-xs md:text-sm font-bold uppercase tracking-wider text-center border-b border-slate-200; }
        .schedule-table td { @apply px-3 py-3 text-xs md:text-sm text-slate-700 border-b border-slate-100 vertical-top transition-all duration-300; }
        .name-tag { @apply inline-flex items-center justify-center px-2 py-1 text-[14px] font-medium text-slate-700 cursor-pointer select-none transition-all whitespace-nowrap rounded-lg; }
        .name-tag:hover { @apply text-indigo-600 bg-indigo-50 shadow-sm; }
        .name-tag.active { @apply text-white bg-indigo-600 scale-105 z-10 shadow-corporate-btn border-none font-semibold; }
        .name-tag.dragging { @apply opacity-30; }
        .name-tag.emergency { @apply text-orange-600 bg-orange-50; }
        .name-tag.empty-slot { @apply text-rose-500 font-bold bg-rose-50 animate-pulse border border-rose-200; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .vertical-top { vertical-align: top; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        input, select, textarea { font-size: 16px !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" src="./MemberDataCenter.js"></script>
    <script type="text/babel" data-type="module" src="./SchedulingAndGovernance.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Activity, LogOut, AlertCircle, User, Lock, Users, Calendar, ArrowRight } from 'lucide-react';
        import { createClient } from '@supabase/supabase-js';

        // ==========================================
        // 初始化連線與共用常數
        // ==========================================
        const SUPABASE_URL = "https://iwmkzsredvbgcqvqlayn.supabase.co";
        const SUPABASE_KEY = "sb_publishable_GwDMLoXcHaTzQDCcQlDuGw_4J9mwiaA"; 
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const constants = {
            ADMIN_ACCOUNT: "tbcadmin", 
            VIRTUAL_DOMAIN: "@tbc.gmail.com",
            sessionsToSchedule: ['第一堂', '第二堂'],
            DEFAULT_MEMBER: {
                name: '', email: '', preferred_session: '第一堂', availability_status: '穩定服事',
                dual_service_pref: 0, group_id: '', unavailable_dates: [], newcomer_rule: '' 
            },
            SESSION_OPTIONS: ['第一堂', '第二堂', '皆可'],
            STATUS_OPTIONS: ['穩定服事', '暫停服事', '安息季', '一季一次']
        };

        // ==========================================
        // 完整的 Utility Functions (工具函式)
        // ==========================================
        const fetchAllData = async (queryFn) => {
            let allData = []; let from = 0; const pageSize = 1000; let hasMore = true;
            try {
                while (hasMore) {
                    const { data, error } = await queryFn().range(from, from + pageSize - 1);
                    if (error) return { data: null, error };
                    if (data && data.length > 0) {
                        allData = [...allData, ...data];
                        if (data.length < pageSize) { hasMore = false; } else { from += pageSize; }
                    } else { hasMore = false; }
                }
                return { data: allData, error: null };
            } catch (error) { return { data: null, error }; }
        };

        const formatEmailForAuth = (acc) => { if (!acc) return ''; const trimmed = acc.trim(); return trimmed.includes('@') ? trimmed : `${trimmed}${constants.VIRTUAL_DOMAIN}`; };
        const extractAccountFromEmail = (email) => { if (!email) return ''; return email.endsWith(constants.VIRTUAL_DOMAIN) ? email.replace(constants.VIRTUAL_DOMAIN, '') : email; };
        
        const generateBaseQuarters = () => {
            const year = new Date().getFullYear();
            return [`${year}-Q1`, `${year}-Q2`, `${year}-Q3`, `${year}-Q4`, `${year+1}-Q1`, `${year+1}-Q2`, `${year+1}-Q3`, `${year+1}-Q4`];
        };
        
        const getCurrentQuarter = () => {
            const now = new Date();
            return `${now.getFullYear()}-Q${Math.ceil((now.getMonth() + 1) / 3)}`;
        };
        
        const getNextQuarter = (qStr) => {
            if (!qStr || qStr === 'BASE') return getCurrentQuarter();
            const [y, q] = qStr.split('-Q').map(Number);
            return q === 4 ? `${y + 1}-Q1` : `${y}-Q${q + 1}`;
        };
        
        const getSundaysInQuarter = (qStr) => {
            if (!qStr || qStr === 'BASE') return [];
            const [year, q] = qStr.split('-Q').map(Number);
            const startMonth = (q - 1) * 3;
            const d = new Date(year, startMonth, 1);
            const sundays = [];
            while (d.getMonth() < startMonth + 3 && d.getFullYear() === year) {
                if (d.getDay() === 0) sundays.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
                d.setDate(d.getDate() + 1);
            }
            return sundays;
        };
        
        const getHolidayName = (dateStr, customHolidays = {}) => customHolidays[dateStr] || '';
        const getQuarterDateRange = () => { return { start: '', end: '' }; }; // 保留相容性
        
        const utils = { fetchAllData, formatEmailForAuth, extractAccountFromEmail, generateBaseQuarters, getCurrentQuarter, getNextQuarter, getSundaysInQuarter, getHolidayName, getQuarterDateRange };

        // ==========================================
        // 元件定義
        // ==========================================
        const StatCard = ({ icon: Icon, title, value, unit, iconBgClass, iconTextClass, trend = null, compact = false }) => (
            <div className={`corporate-card relative overflow-hidden ${compact ? 'p-5' : 'p-6'}`}>
                <div className={`flex justify-between items-start ${compact ? 'mb-4' : 'mb-5'} relative z-10`}>
                    <div className={`${iconBgClass} ${compact ? 'p-2.5 rounded-lg' : 'p-3 rounded-xl'} ${iconTextClass}`}>
                        <Icon size={compact ? 20 : 24} strokeWidth={2}/>
                    </div>
                    {trend && <div className="text-[12px] font-semibold text-slate-500 bg-slate-50 px-2.5 py-1 rounded-md border border-slate-100">{trend}</div>}
                </div>
                <div className="relative z-10">
                    <p className={`${compact ? 'text-sm' : 'text-base'} font-medium text-slate-500 mb-1`}>{title}</p>
                    <p className={`${compact ? 'text-3xl' : 'text-4xl'} font-bold text-slate-900 tracking-tight`}>{value} <span className="text-sm font-medium text-slate-400 ml-1">{unit}</span></p>
                </div>
            </div>
        );

        const AuthScreen = () => {
            const [account, setAccount] = useState(''); const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false); const [errorMsg, setErrorMsg] = useState('');

            const handleAuth = async (e) => {
                e.preventDefault(); setLoading(true); setErrorMsg('');
                const emailToUse = formatEmailForAuth(account);
                const { error } = await supabase.auth.signInWithPassword({ email: emailToUse, password });
                if (error) { setErrorMsg('登入失敗，請檢查帳號密碼。'); setLoading(false); }
            };

            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 relative overflow-hidden">
                    <div className="bg-blob bg-blob-1"></div>
                    <div className="bg-blob bg-blob-2"></div>
                    
                    <div className="corporate-card max-w-md w-full p-8 sm:p-10 animate-fade-in relative z-10 perspective-[2000px]">
                        <div className="flex flex-col items-center mb-8">
                            <div className="bg-gradient-to-br from-indigo-500 to-violet-600 p-4 rounded-xl text-white shadow-corporate-btn mb-5"><Activity size={32} /></div>
                            <h1 className="text-3xl font-extrabold text-slate-900 text-center tracking-tight">TBC Serve</h1>
                            <p className="text-slate-500 font-medium mt-2">Manager Portal</p>
                        </div>
                        {errorMsg && <div className="bg-rose-50 text-rose-600 text-sm font-semibold p-4 rounded-lg mb-6 flex items-start gap-2 border border-rose-100"><AlertCircle size={18} className="shrink-0 mt-0.5" /> {errorMsg}</div>}
                        <form onSubmit={handleAuth} className="space-y-5">
                            <div className="space-y-2">
                                <label className="text-sm font-semibold text-slate-700">Account</label>
                                <div className="relative">
                                    <User className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                    <input type="text" value={account} onChange={(e) => setAccount(e.target.value)} className="w-full corporate-input pl-11 pr-4 py-3 text-slate-900" placeholder="電話號碼或電子郵件" required />
                                </div>
                            </div>
                            <div className="space-y-2">
                                <label className="text-sm font-semibold text-slate-700">Password</label>
                                <div className="relative">
                                    <Lock className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full corporate-input pl-11 pr-4 py-3 text-slate-900" placeholder="●●●●●●" required />
                                </div>
                            </div>
                            <button type="submit" disabled={loading} className="w-full corporate-btn py-3.5 mt-6 text-lg">{loading ? 'Processing...' : 'Sign In'}</button>
                        </form>
                    </div>
                </div>
            );
        };

        const MainApp = ({ session }) => {
            const [currentApp, setCurrentApp] = useState('home'); 

            const handleLogout = async () => { await supabase.auth.signOut(); window.location.reload(); };

            if (currentApp === 'home') {
                return (
                    <div className="min-h-screen bg-slate-50 font-sans flex flex-col relative overflow-hidden">
                        <div className="bg-blob bg-blob-1"></div>
                        <div className="bg-blob bg-blob-2"></div>
                        
                        <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 sm:px-10 py-4 flex justify-between items-center z-20">
                            <div className="flex items-center gap-3"><Activity className="text-indigo-600" size={24} /><h1 className="text-lg font-bold text-slate-900 tracking-tight">TBC Serve</h1></div>
                            <button onClick={handleLogout} className="flex items-center gap-2 text-slate-500 hover:text-slate-900 font-medium px-4 py-2 rounded-lg transition-colors"><LogOut size={18} /> <span className="hidden sm:inline">Sign Out</span></button>
                        </header>
                        <main className="flex-1 w-full max-w-6xl mx-auto px-6 py-16 sm:py-24 animate-fade-in flex flex-col justify-center relative z-10">
                            <div className="mb-12">
                                <h2 className="text-4xl sm:text-5xl font-extrabold text-slate-900 mb-4 tracking-tight">Welcome back</h2>
                                <p className="text-slate-500 font-medium text-lg">Select a workspace to continue.</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-8">
                                <div onClick={() => setCurrentApp('members')} className="corporate-card p-8 cursor-pointer group hover:rotate-x-[2deg] hover:rotate-y-[-2deg]">
                                    <div className="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center mb-8"><Users size={28} /></div>
                                    <h3 className="text-2xl font-bold text-slate-900 mb-6">同工資料中心</h3>
                                    <div className="flex items-center gap-2 text-indigo-600 font-semibold group-hover:translate-x-2 transition-transform">Enter Workspace <ArrowRight size={16} /></div>
                                </div>
                                <div onClick={() => setCurrentApp('scheduling')} className="corporate-card p-8 cursor-pointer group hover:rotate-x-[2deg] hover:rotate-y-[2deg]">
                                    <div className="w-14 h-14 bg-violet-50 text-violet-600 rounded-xl flex items-center justify-center mb-8"><Calendar size={28} /></div>
                                    <h3 className="text-2xl font-bold text-slate-900 mb-6">排班作業中心</h3>
                                    <div className="flex items-center gap-2 text-violet-600 font-semibold group-hover:translate-x-2 transition-transform">Enter Workspace <ArrowRight size={16} /></div>
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            const MemberDataCenterComp = window.MemberDataCenter;
            const SchedulingAndGovernanceComp = window.SchedulingAndGovernance;

            return (
                <div className="flex h-screen w-full bg-slate-50 overflow-hidden font-sans relative">
                    <main className="flex-1 flex flex-col h-full overflow-hidden relative z-10">
                        {currentApp === 'members' && (
                            MemberDataCenterComp ? <MemberDataCenterComp session={session} goBack={() => setCurrentApp('home')} goToSchedule={() => setCurrentApp('scheduling')} supabase={supabase} utils={utils} constants={constants} /> : null
                        )}
                        {currentApp === 'scheduling' && (
                            SchedulingAndGovernanceComp ? <SchedulingAndGovernanceComp session={session} goBack={() => setCurrentApp('home')} goToMembers={() => setCurrentApp('members')} supabase={supabase} utils={utils} constants={constants} StatCard={StatCard} /> : null
                        )}
                    </main>
                </div>
            );
        }

        // ==========================================
        // 系統啟動進入點 (App) - 這個之前被省略掉了！
        // ==========================================
        function App() {
            const [session, setSession] = useState(null);
            const [isSessionLoaded, setIsSessionLoaded] = useState(false);
            
            useEffect(() => {
                const checkAdmin = async (sess) => {
                    if (sess) {
                        const acc = utils.extractAccountFromEmail(sess.user?.email);
                        if (acc !== constants.ADMIN_ACCOUNT && sess.user?.email !== constants.ADMIN_ACCOUNT) {
                            await supabase.auth.signOut();
                            setSession(null); setIsSessionLoaded(true); return;
                        }
                    }
                    setSession(sess); setIsSessionLoaded(true);
                };
                supabase.auth.getSession().then(({ data: { session } }) => { checkAdmin(session); });
                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => { checkAdmin(session); });
                return () => subscription.unsubscribe();
            }, []);

            if (!isSessionLoaded) return <div className="min-h-screen bg-slate-50 flex items-center justify-center"><div className="text-slate-400 font-bold animate-pulse">Loading...</div></div>;
            if (!session) return <AuthScreen />;
            return <MainApp session={session} />;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
