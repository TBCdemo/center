<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TBC Serve Manager</title>
    
    <script src="scheduler.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react,react-dom",
            "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
        }
    }
    </script>
    <style type="text/tailwindcss">
        body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .schedule-table th { @apply px-3 py-4 bg-slate-200/80 text-slate-800 text-xs md:text-sm font-black uppercase tracking-wider text-center border-b-2 border-slate-300; }
        .schedule-table td { @apply px-3 py-2.5 text-xs md:text-sm text-slate-700 border-b border-slate-200 vertical-top transition-all duration-300; }
        .name-tag { @apply inline-flex items-center justify-center px-1.5 py-0.5 text-[15px] font-bold text-slate-700 cursor-pointer select-none transition-all whitespace-nowrap rounded-md; }
        .name-tag:hover { @apply text-indigo-600 bg-indigo-50/50; }
        .name-tag.active { @apply text-indigo-700 bg-indigo-100 scale-105 z-10 shadow-sm border border-indigo-200; }
        .name-tag.dragging { @apply opacity-30; }
        .name-tag.emergency { @apply text-orange-600; }
        .name-tag.empty-slot { @apply text-red-500 font-black animate-pulse; }
        .name-tag.conflict { @apply text-rose-600 font-black !important; }
        .name-tag.orphan { @apply text-sky-600 font-black !important; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        .animate-panel-right { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        .vertical-top { vertical-align: top; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar, ::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track, ::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb, ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover, ::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
        input, select, textarea { font-size: 16px !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" src="./MemberDataCenter.js"></script>
    <script type="text/babel" data-type="module" src="./SchedulingAndGovernance.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Activity, LogOut, AlertCircle, User, Lock, Users, Calendar, ArrowRight } from 'lucide-react';
        import { createClient } from '@supabase/supabase-js';

        // ==========================================
        // 初始化連線與共用常數 (傳遞給子模組使用)
        // ==========================================
        const SUPABASE_URL = "https://iwmkzsredvbgcqvqlayn.supabase.co";
        const SUPABASE_KEY = "sb_publishable_GwDMLoXcHaTzQDCcQlDuGw_4J9mwiaA"; 
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const constants = {
            ADMIN_ACCOUNT: "tbcadmin", 
            VIRTUAL_DOMAIN: "@tbc.gmail.com",
            sessionsToSchedule: ['第一堂', '第二堂'],
            DEFAULT_MEMBER: {
                name: '', email: '', preferred_session: '第一堂', availability_status: '穩定服事',
                dual_service_pref: 0, group_id: '', unavailable_dates: [], newcomer_rule: '' 
            },
            SESSION_OPTIONS: ['第一堂', '第二堂', '皆可'],
            STATUS_OPTIONS: ['穩定服事', '暫停服事', '安息季', '一季一次']
        };

        const fetchAllData = async (queryFn) => {
            let allData = []; let from = 0; const pageSize = 1000; let hasMore = true;
            try {
                while (hasMore) {
                    const { data, error } = await queryFn().range(from, from + pageSize - 1);
                    if (error) return { data: null, error };
                    if (data && data.length > 0) {
                        allData = [...allData, ...data];
                        if (data.length < pageSize) { hasMore = false; } else { from += pageSize; }
                    } else { hasMore = false; }
                }
                return { data: allData, error: null };
            } catch (error) { return { data: null, error }; }
        };

        const formatEmailForAuth = (acc) => { if (!acc) return ''; const trimmed = acc.trim(); return trimmed.includes('@') ? trimmed : `${trimmed}${constants.VIRTUAL_DOMAIN}`; };
        const extractAccountFromEmail = (email) => { if (!email) return ''; return email.endsWith(constants.VIRTUAL_DOMAIN) ? email.replace(constants.VIRTUAL_DOMAIN, '') : email; };
        
        const utils = {
            fetchAllData, formatEmailForAuth, extractAccountFromEmail,
            generateBaseQuarters: () => {
                const d = new Date(); const currentYear = d.getFullYear(); const currentQ = Math.floor(d.getMonth() / 3) + 1;
                const quarters = [];
                for (let offset = 0; offset <= 2; offset++) {
                    let q = currentQ + offset; let y = currentYear;
                    if (q > 4) { q -= 4; y += 1; }
                    quarters.push(`${y}-Q${q}`);
                }
                return quarters;
            },
            getNextQuarter: (qStr) => {
                let [y, q] = qStr.split('-Q').map(Number);
                if (q === 4) return `${y + 1}-Q1`; return `${y}-Q${q + 1}`;
            },
            getCurrentQuarter: () => { const d = new Date(); return `${d.getFullYear()}-Q${Math.floor(d.getMonth() / 3) + 1}`; },
            getSundaysInQuarter: (quarterStr) => {
                if (!quarterStr) return []; const parts = quarterStr.split('-Q'); if (parts.length !== 2) return [];
                const year = parseInt(parts[0], 10); const quarter = parseInt(parts[1], 10);
                if (isNaN(year) || isNaN(quarter)) return [];
                const startMonth = (quarter - 1) * 3; const startDate = new Date(year, startMonth, 1); const endDate = new Date(year, startMonth + 3, 0); const sundays = [];
                for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                    if (d.getDay() === 0) { 
                        const yyyy = d.getFullYear(); const mm = String(d.getMonth() + 1).padStart(2, '0'); const dd = String(d.getDate()).padStart(2, '0');
                        sundays.push(`${yyyy}-${mm}-${dd}`);
                    }
                }
                return sundays;
            },
            getHolidayName: (dateStr, customHolidaysMap = {}) => {
                if (customHolidaysMap && customHolidaysMap[dateStr]) return customHolidaysMap[dateStr];
                const [year, month, day] = dateStr.split('-'); const md = `${month}-${day}`;
                const lunarAndLongWeekends = {
                    '2026-02-15': '春節連假', '2026-02-22': '春節連假', '2026-03-01': '228連假', '2026-04-05': '清明連假', '2026-06-21': '端午連假', '2026-09-27': '中秋連假', '2026-10-11': '國慶連假',
                    '2027-02-07': '春節連假', '2027-02-14': '春節連假', '2027-02-28': '228連假', '2027-04-04': '清明連假', '2027-06-13': '端午連假', '2027-09-19': '中秋連假', '2027-10-10': '國慶連假'
                };
                if (lunarAndLongWeekends[dateStr]) return lunarAndLongWeekends[dateStr];
                const dayNum = parseInt(day, 10); if (month === '05' && dayNum >= 8 && dayNum <= 14) return '母親節';
                const fixedHolidays = { '01-01': '元旦', '02-28': '和平紀念日', '04-04': '兒童節', '04-05': '清明節', '05-01': '勞動節', '08-08': '父親節', '10-10': '國慶日', '12-25': '聖誕節' };
                if (fixedHolidays[md]) return fixedHolidays[md]; return null; 
            },
            getQuarterDateRange: (y, q) => {
                const startMonth = (q - 1) * 3; const startDate = new Date(y, startMonth, 1); const endDate = new Date(y, startMonth + 3, 0); 
                const format = (d) => { const yyyy = d.getFullYear(); const mm = String(d.getMonth() + 1).padStart(2, '0'); const dd = String(d.getDate()).padStart(2, '0'); return `${yyyy}-${mm}-${dd}`; };
                return { start: format(startDate), end: format(endDate) };
            }
        };

        const StatCard = ({ icon: Icon, title, value, unit, iconBgClass, iconTextClass, trend = null, compact = false }) => (
            <div className={`bg-white ${compact ? 'p-4 lg:p-5' : 'p-5 lg:p-6'} rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-between hover:shadow-md transition-all relative overflow-hidden`}>
                <div className={`flex justify-between items-start ${compact ? 'mb-3' : 'mb-4'} relative z-10`}>
                    <div className={`${iconBgClass} ${compact ? 'p-2.5 rounded-xl' : 'p-3 rounded-2xl'} ${iconTextClass}`}><Icon size={compact ? 18 : 22} strokeWidth={2.5}/></div>
                    {trend && <div className="text-[11px] font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded-lg">{trend}</div>}
                </div>
                <div className="relative z-10">
                    <p className={`${compact ? 'text-xs' : 'text-[13px]'} font-bold text-slate-500 mb-1`}>{title}</p>
                    <p className={`${compact ? 'text-2xl' : 'text-3xl'} font-black text-slate-800 tracking-tight`}>{value} <span className="text-sm font-bold text-slate-400 ml-1">{unit}</span></p>
                </div>
                <div className={`absolute -bottom-6 -right-6 opacity-[0.03] scale-150 ${iconTextClass}`}><Icon size={compact ? 80 : 100} /></div>
            </div>
        );

        // ==========================================
        // 登入元件 AuthScreen
        // ==========================================
        const AuthScreen = () => {
            const [account, setAccount] = useState(''); const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false); const [errorMsg, setErrorMsg] = useState('');

            const handleAuth = async (e) => {
                e.preventDefault(); setLoading(true); setErrorMsg('');
                const loginEmail = formatEmailForAuth(account);
                try {
                    const { data, error } = await supabase.auth.signInWithPassword({ email: loginEmail, password });
                    if (error) throw error;
                    const loggedInEmail = data.user?.email; const loggedInAccount = extractAccountFromEmail(loggedInEmail);
                    if (loggedInAccount !== constants.ADMIN_ACCOUNT && loggedInEmail !== constants.ADMIN_ACCOUNT) {
                        await supabase.auth.signOut(); throw new Error('僅限管理員登入');
                    }
                } catch (error) {
                    let msg = error.message;
                    if (msg.includes('Invalid login credentials')) msg = '登入失敗：帳號或密碼錯誤。';
                    if (msg === '僅限管理員登入') msg = '登入失敗：僅限管理員使用。';
                    setErrorMsg(msg);
                } finally { setLoading(false); }
            };

            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                    <div className="bg-white max-w-md w-full rounded-[2rem] shadow-xl p-6 sm:p-8 border border-slate-100 animate-fade-in">
                        <div className="flex flex-col items-center mb-8">
                            <div className="bg-indigo-600 p-4 rounded-2xl text-white shadow-md mb-4"><Activity size={32} /></div>
                            <h1 className="text-2xl font-black text-slate-800 text-center leading-tight">TBC<br />Serve Manager</h1>
                        </div>
                        {errorMsg && <div className="bg-red-50 text-red-600 text-sm font-bold p-3 rounded-xl mb-6 flex items-center gap-2"><AlertCircle size={18} className="shrink-0" /> {errorMsg}</div>}
                        <form onSubmit={handleAuth} className="space-y-4 sm:space-y-5">
                            <div className="space-y-1.5"><label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">帳號</label><div className="relative"><User className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} /><input type="text" value={account} onChange={(e) => setAccount(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3.5 outline-none focus:border-indigo-500 font-semibold text-slate-700" placeholder="電話號碼或電子郵件" required /></div></div>
                            <div className="space-y-1.5"><label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">密碼</label><div className="relative"><Lock className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} /><input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3.5 outline-none focus:border-indigo-500 font-semibold text-slate-700" placeholder="●●●●●●" required /></div></div>
                            <button type="submit" disabled={loading} className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white font-black py-4 rounded-xl shadow-lg mt-4 text-lg">{loading ? '處理中...' : '登入系統'}</button>
                        </form>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 主應用框架 (首頁導覽)
        // ==========================================
        const MainApp = ({ session }) => {
            const [currentApp, setCurrentApp] = useState('home'); 

            const handleLogout = async () => { await supabase.auth.signOut(); window.location.reload(); };

            if (currentApp === 'home') {
                return (
                    <div className="min-h-screen bg-slate-100 font-sans flex flex-col">
                        <header className="bg-white border-b border-slate-200 px-6 sm:px-8 py-4 flex justify-between items-center shadow-sm shrink-0">
                            <div className="flex items-center gap-3"><Activity className="text-indigo-600" size={28} /><h1 className="text-lg sm:text-xl font-black text-slate-800 tracking-tight">TBC Serve Manager</h1></div>
                            <button onClick={handleLogout} className="flex items-center gap-2 text-slate-500 hover:text-red-600 font-bold px-3 sm:px-4 py-2 rounded-xl hover:bg-red-50 transition-colors"><LogOut size={18} /> <span className="hidden sm:inline">Log Out</span></button>
                        </header>
                        <main className="flex-1 w-full max-w-5xl mx-auto px-6 py-10 sm:py-16 animate-fade-in flex flex-col justify-center">
                            <div className="mb-10 sm:mb-12"><h2 className="text-3xl sm:text-4xl font-black text-slate-800 mb-3">Welcome</h2><p className="text-slate-500 font-bold text-sm sm:text-base">請點擊下方卡片，選擇您要執行的作業：</p></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-8">
                                <div onClick={() => setCurrentApp('members')} className="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm hover:shadow-xl hover:border-indigo-300 hover:-translate-y-1 transition-all cursor-pointer group relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-40 h-40 bg-indigo-50 rounded-bl-full -z-10 transition-transform group-hover:scale-110"></div>
                                    <div className="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mb-6 shadow-inner"><Users size={32} /></div>
                                    <h3 className="text-2xl font-black text-slate-800 mb-10">同工資料中心</h3>
                                    <div className="flex items-center gap-2 text-indigo-600 font-black text-sm group-hover:translate-x-2 transition-transform">Enter <ArrowRight size={16} /></div>
                                </div>
                                <div onClick={() => setCurrentApp('scheduling')} className="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm hover:shadow-xl hover:border-emerald-300 hover:-translate-y-1 transition-all cursor-pointer group relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-40 h-40 bg-emerald-50 rounded-bl-full -z-10 transition-transform group-hover:scale-110"></div>
                                    <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mb-6 shadow-inner"><Calendar size={32} /></div>
                                    <h3 className="text-2xl font-black text-slate-800 mb-10">排班作業中心</h3>
                                    <div className="flex items-center gap-2 text-emerald-600 font-black text-sm group-hover:translate-x-2 transition-transform">Enter <ArrowRight size={16} /></div>
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            // 動態從 window 取得拆分後的 React 元件
            const MemberDataCenterComp = window.MemberDataCenter;
            const SchedulingAndGovernanceComp = window.SchedulingAndGovernance;

            return (
                <div className="flex h-screen w-full bg-slate-100 overflow-hidden font-sans relative">
                    <main className="flex-1 flex flex-col h-full overflow-hidden relative z-10">
                        {currentApp === 'members' && (
                            MemberDataCenterComp 
                                ? <MemberDataCenterComp session={session} goBack={() => setCurrentApp('home')} goToSchedule={() => setCurrentApp('scheduling')} supabase={supabase} utils={utils} constants={constants} />
                                : <div className="flex-1 flex items-center justify-center font-bold text-slate-500 animate-pulse">載入模組中...</div>
                        )}
                        {currentApp === 'scheduling' && (
                            SchedulingAndGovernanceComp 
                                ? <SchedulingAndGovernanceComp session={session} goBack={() => setCurrentApp('home')} goToMembers={() => setCurrentApp('members')} supabase={supabase} utils={utils} constants={constants} StatCard={StatCard} />
                                : <div className="flex-1 flex items-center justify-center font-bold text-slate-500 animate-pulse">載入模組中...</div>
                        )}
                    </main>
                </div>
            );
        }

        // ==========================================
        // 系統進入點 App 
        // ==========================================
        function App() {
            const [session, setSession] = useState(null);
            const [isSessionLoaded, setIsSessionLoaded] = useState(false);
            
            useEffect(() => {
                const checkAdmin = async (sess) => {
                    if (sess) {
                        const acc = extractAccountFromEmail(sess.user?.email);
                        if (acc !== constants.ADMIN_ACCOUNT && sess.user?.email !== constants.ADMIN_ACCOUNT) {
                            await supabase.auth.signOut();
                            setSession(null); setIsSessionLoaded(true); return;
                        }
                    }
                    setSession(sess); setIsSessionLoaded(true);
                };
                supabase.auth.getSession().then(({ data: { session } }) => { checkAdmin(session); });
                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => { checkAdmin(session); });
                return () => subscription.unsubscribe();
            }, []);

            if (!isSessionLoaded) return <div className="min-h-screen bg-slate-50 flex items-center justify-center"><div className="text-slate-400 font-bold animate-pulse">系統載入中...</div></div>;
            if (!session) return <AuthScreen />;
            return <MainApp session={session} />;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
