<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TBC Serve Manager</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="scheduler.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(79, 70, 229, 0.1)',
                        'hover-soft': '0 10px 25px -5px rgba(79, 70, 229, 0.15), 0 8px 10px -6px rgba(79, 70, 229, 0.1)',
                        'button': '0 4px 14px 0 rgba(79, 70, 229, 0.3)',
                        'glow': '0 0 20px rgba(79,70,229,0.5)'
                    }
                }
            }
        }
    </script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react,react-dom",
            "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
        }
    }
    </script>
    <style type="text/tailwindcss">
        /* 移除 overflow: hidden 讓全域可以正常捲動，防止卡住 */
        body { background-color: #f8fafc; font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .schedule-table th { @apply px-3 py-4 bg-slate-200/80 text-slate-800 text-xs md:text-sm font-medium uppercase tracking-wider text-center border-b-2 border-slate-300; }
        .schedule-table td { @apply px-3 py-2.5 text-xs md:text-sm text-slate-700 border-b border-slate-200 vertical-top transition-all duration-300; }
        
        .name-tag { @apply inline-flex items-center justify-center px-1.5 py-0.5 text-[15px] font-normal text-slate-700 cursor-pointer select-none transition-all whitespace-nowrap rounded-md; }
        .name-tag:hover { @apply text-indigo-600 bg-indigo-50/50; }
        .name-tag.active { @apply text-indigo-700 bg-indigo-100 scale-105 z-10 shadow-sm border border-indigo-200; }
        .name-tag.dragging { @apply opacity-30; }
        .name-tag.emergency { @apply text-orange-600; }
        .name-tag.empty-slot { @apply text-red-500 font-bold animate-pulse; }
        .name-tag.conflict { @apply text-rose-600 font-bold !important; }
        .name-tag.orphan { @apply text-sky-600 font-bold !important; }
        
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        .animate-panel-right { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95) translateY(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        .vertical-top { vertical-align: top; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar, ::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track, ::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb, ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover, ::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
        input, select, textarea { font-size: 16px !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" src="./MemberDataCenter.js"></script>
    <script type="text/babel" data-type="module" src="./SchedulingAndGovernance.js"></script>
    <script type="text/babel" data-type="module" src="./TeamInsights.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Activity, LogOut, AlertCircle, User, Lock, Users, Calendar, ArrowRight, ShieldCheck, Eye, EyeOff, BarChart3 } from 'lucide-react';
        import { createClient } from '@supabase/supabase-js';

        // ==========================================
        // 初始化連線與共用常數
        // ==========================================
        const SUPABASE_URL = "https://iwmkzsredvbgcqvqlayn.supabase.co";
        const SUPABASE_KEY = "sb_publishable_GwDMLoXcHaTzQDCcQlDuGw_4J9mwiaA"; 
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const constants = {
            VIRTUAL_DOMAIN: "@tbc.gmail.com",
            sessionsToSchedule: ['第一堂', '第二堂'],
            DEFAULT_MEMBER: {
                name: '', email: '', preferred_session: '第一堂', availability_status: '穩定服事',
                dual_service_pref: 0, group_id: '', unavailable_dates: [], newcomer_rule: '' 
            },
            SESSION_OPTIONS: ['第一堂', '第二堂', '皆可'],
            STATUS_OPTIONS: ['穩定服事', '暫停服事', '安息季', '一季一次']
        };

        const fetchAllData = async (queryFn) => {
            let allData = []; let from = 0; const pageSize = 1000; let hasMore = true;
            try {
                while (hasMore) {
                    const { data, error } = await queryFn().range(from, from + pageSize - 1);
                    if (error) return { data: null, error };
                    if (data && data.length > 0) {
                        allData = [...allData, ...data];
                        if (data.length < pageSize) { hasMore = false; } else { from += pageSize; }
                    } else { hasMore = false; }
                }
                return { data: allData, error: null };
            } catch (error) { return { data: null, error }; }
        };

        const formatEmailForAuth = (acc) => { if (!acc) return ''; const trimmed = acc.trim(); return trimmed.includes('@') ? trimmed : `${trimmed}${constants.VIRTUAL_DOMAIN}`; };
        const extractAccountFromEmail = (email) => { if (!email) return ''; return email.endsWith(constants.VIRTUAL_DOMAIN) ? email.replace(constants.VIRTUAL_DOMAIN, '') : email; };
        
        const utils = {
            fetchAllData, formatEmailForAuth, extractAccountFromEmail,
            generateBaseQuarters: () => {
                const d = new Date(); const currentYear = d.getFullYear(); const currentQ = Math.floor(d.getMonth() / 3) + 1;
                const quarters = [];
                for (let offset = 0; offset <= 2; offset++) {
                    let q = currentQ + offset; let y = currentYear;
                    if (q > 4) { q -= 4; y += 1; }
                    quarters.push(`${y}-Q${q}`);
                }
                return quarters;
            },
            getNextQuarter: (qStr) => {
                let [y, q] = qStr.split('-Q').map(Number);
                if (q === 4) return `${y + 1}-Q1`; return `${y}-Q${q + 1}`;
            },
            getCurrentQuarter: () => { const d = new Date(); return `${d.getFullYear()}-Q${Math.floor(d.getMonth() / 3) + 1}`; },
            getSundaysInQuarter: (quarterStr) => {
                if (!quarterStr) return []; const parts = quarterStr.split('-Q'); if (parts.length !== 2) return [];
                const year = parseInt(parts[0], 10); const quarter = parseInt(parts[1], 10);
                if (isNaN(year) || isNaN(quarter)) return [];
                const startMonth = (quarter - 1) * 3; const startDate = new Date(year, startMonth, 1); const endDate = new Date(year, startMonth + 3, 0); const sundays = [];
                for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                    if (d.getDay() === 0) { 
                        const yyyy = d.getFullYear(); const mm = String(d.getMonth() + 1).padStart(2, '0'); const dd = String(d.getDate()).padStart(2, '0');
                        sundays.push(`${yyyy}-${mm}-${dd}`);
                    }
                }
                return sundays;
            },
            getHolidayName: (dateStr, customHolidaysMap = {}) => {
                if (customHolidaysMap && customHolidaysMap[dateStr]) return customHolidaysMap[dateStr];
                const [year, month, day] = dateStr.split('-'); const md = `${month}-${day}`;
                const lunarAndLongWeekends = {
                    '2026-02-15': '春節連假', '2026-02-22': '春節連假', '2026-03-01': '228連假', '2026-04-05': '清明連假', '2026-06-21': '端午連假', '2026-09-27': '中秋連假', '2026-10-11': '國慶連假',
                    '2027-02-07': '春節連假', '2027-02-14': '春節連假', '2027-02-28': '228連假', '2027-04-04': '清明連假', '2027-06-13': '端午連假', '2027-09-19': '中秋連假', '2027-10-10': '國慶連假'
                };
                if (lunarAndLongWeekends[dateStr]) return lunarAndLongWeekends[dateStr];
                const dayNum = parseInt(day, 10); if (month === '05' && dayNum >= 8 && dayNum <= 14) return '母親節';
                const fixedHolidays = { '01-01': '元旦', '02-28': '和平紀念日', '04-04': '兒童節', '04-05': '清明節', '05-01': '勞動節', '08-08': '父親節', '10-10': '國慶日', '12-25': '聖誕節' };
                if (fixedHolidays[md]) return fixedHolidays[md]; return null; 
            },
            getQuarterDateRange: (y, q) => {
                const startMonth = (q - 1) * 3; const startDate = new Date(y, startMonth, 1); const endDate = new Date(y, startMonth + 3, 0); 
                const format = (d) => { const yyyy = d.getFullYear(); const mm = String(d.getMonth() + 1).padStart(2, '0'); const dd = String(d.getDate()).padStart(2, '0'); return `${yyyy}-${mm}-${dd}`; };
                return { start: format(startDate), end: format(endDate) };
            }
        };

        const StatCard = ({ icon: Icon, title, value, unit, iconBgClass, iconTextClass, trend = null, compact = false }) => (
            <div className={`bg-white ${compact ? 'p-4 lg:p-5' : 'p-5 lg:p-6'} rounded-xl shadow-soft hover:shadow-hover-soft hover:-translate-y-1 transition-all duration-200 border border-slate-100 flex flex-col justify-between relative overflow-hidden`}>
                <div className={`flex justify-between items-start ${compact ? 'mb-3' : 'mb-4'} relative z-10`}>
                    <div className={`${iconBgClass} ${compact ? 'p-2.5 rounded-lg' : 'p-3 rounded-xl'} ${iconTextClass}`}><Icon size={compact ? 18 : 22} strokeWidth={2.5}/></div>
                    {trend && <div className="text-[11px] font-medium text-slate-400 bg-slate-50 px-2 py-1 rounded-md">{trend}</div>}
                </div>
                <div className="relative z-10">
                    <p className={`${compact ? 'text-xs' : 'text-[13px]'} font-medium text-slate-500 mb-1`}>{title}</p>
                    <p className={`${compact ? 'text-2xl' : 'text-3xl'} font-bold text-slate-900 tracking-tight`}>{value} <span className="text-sm font-medium text-slate-400 ml-1">{unit}</span></p>
                </div>
                <div className={`absolute -bottom-6 -right-6 opacity-[0.03] scale-150 ${iconTextClass}`}><Icon size={compact ? 80 : 100} /></div>
            </div>
        );

        // ==========================================
        // 登入元件 AuthScreen
        // ==========================================
        const AuthScreen = () => {
            const [account, setAccount] = useState('');
            const [password, setPassword] = useState('');
            const [confirmPassword, setConfirmPassword] = useState(''); 
            const [loading, setLoading] = useState(false);
            const [isSignUp, setIsSignUp] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [showConfirmPassword, setShowConfirmPassword] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                setLoading(true);
                setErrorMsg('');
                
                const loginEmail = formatEmailForAuth(account);

                try {
                    if (isSignUp) {
                        if (password !== confirmPassword) throw new Error('兩次輸入的密碼不同');

                        const { data: isValid, error: checkError } = await supabase.rpc('check_member_exists', { 
                            p_account: account
                        });

                        if (checkError) {
                            console.error("驗證錯誤:", checkError);
                            throw new Error('驗證時發生錯誤，再試一次，或聯絡行政辦公室');
                        }

                        if (!isValid) {
                            throw new Error('查無此帳號，再試一次，或聯絡行政辦公室');
                        }

                        const { data, error } = await supabase.auth.signUp({ email: loginEmail, password });
                        
                        const isFakeSuccess = data?.user && data.user.identities && data.user.identities.length === 0;
                        const isCompletelyNull = !error && (!data || !data.user);
                        
                        if (isFakeSuccess || isCompletelyNull) {
                            throw new Error('User already registered'); 
                        }

                        if (error) throw error;
                        
                        alert('註冊成功');
                        setIsSignUp(false);
                        setConfirmPassword('');
                        setShowPassword(false);
                        setShowConfirmPassword(false);
                        
                    } else {
                        const { error } = await supabase.auth.signInWithPassword({ email: loginEmail, password });
                        if (error) throw error;
                    }
                } catch (error) {
                    let msg = error.message;
                    if (msg.includes('Invalid login credentials')) msg = '登入失敗：帳號或密碼錯誤';
                    if (msg.includes('User already registered')) msg = 'Oops！帳號已經註冊過了';
                    if (msg.includes('Password should be at least')) msg = '密碼長度至少需 6 個字元';
                    if (msg.includes('查無此帳號')) msg = error.message; 
                    if (msg.includes('驗證時發生錯誤')) msg = error.message; 
                    if (msg.includes('兩次輸入的密碼不同')) msg = error.message; 
                    setErrorMsg(msg);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="fixed inset-0 bg-slate-50 overflow-y-auto custom-scrollbar">
                    <div className="min-h-screen w-full flex flex-col items-center justify-center p-4 py-8 relative">
                        <div className="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-indigo-600/10 blur-[120px] pointer-events-none"></div>
                        <div className="fixed bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-violet-600/10 blur-[120px] pointer-events-none"></div>

                        <div className="bg-white max-w-md w-full rounded-[2rem] shadow-xl p-6 sm:p-8 border border-slate-100 animate-fade-in z-10 my-auto relative">
                            <div className="flex flex-col items-center mb-8">
                                <div className="bg-gradient-to-br from-indigo-600 to-violet-600 p-4 rounded-xl text-white shadow-button mb-4"><Activity size={32} /></div>
                                <h1 className="text-2xl font-extrabold text-slate-900 text-center tracking-tight leading-tight">TBC Serve Manager</h1>
                            </div>

                            {errorMsg && (
                                <div className="bg-red-50 text-red-600 text-sm font-bold p-3 rounded-xl mb-6 flex items-center gap-2 leading-relaxed">
                                    <AlertCircle size={18} className="shrink-0" /> {errorMsg}
                                </div>
                            )}

                            <form onSubmit={handleAuth} className="space-y-4 sm:space-y-5">
                                <div className="space-y-1.5">
                                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">帳號</label>
                                    <div className="relative">
                                        <User className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                        <input type="text" value={account} onChange={(e) => setAccount(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all font-semibold text-slate-700" placeholder="電話號碼或電子郵件" required />
                                    </div>
                                </div>
                                
                                <div className="space-y-1.5">
                                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">密碼</label>
                                    <div className="relative">
                                        <Lock className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                        <input 
                                            type={showPassword ? "text" : "password"} 
                                            value={password} 
                                            onChange={(e) => setPassword(e.target.value)} 
                                            className="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-11 py-3.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all font-semibold text-slate-700" 
                                            placeholder="6位以上英數組合" 
                                            required 
                                        />
                                        <button 
                                            type="button" 
                                            onClick={() => setShowPassword(!showPassword)} 
                                            className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 transition-colors focus:outline-none"
                                        >
                                            {showPassword ? <EyeOff size={18} /> : <Eye size={18} />}
                                        </button>
                                    </div>
                                </div>

                                {isSignUp && (
                                    <div className="space-y-1.5 animate-fade-in">
                                        <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">確認密碼 <span className="text-red-500">*</span></label>
                                        <div className="relative">
                                            <Lock className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                            <input 
                                                type={showConfirmPassword ? "text" : "password"} 
                                                value={confirmPassword} 
                                                onChange={(e) => setConfirmPassword(e.target.value)} 
                                                className="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-11 py-3.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all font-semibold text-slate-700" 
                                                placeholder="再次輸入密碼" 
                                                required={isSignUp} 
                                            />
                                            <button 
                                                type="button" 
                                                onClick={() => setShowConfirmPassword(!showConfirmPassword)} 
                                                className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 transition-colors focus:outline-none"
                                            >
                                                {showConfirmPassword ? <EyeOff size={18} /> : <Eye size={18} />}
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {isSignUp && (
                                    <div className="bg-amber-50 text-amber-700 text-xs font-bold p-3 rounded-xl border border-amber-100 flex items-start gap-2 leading-relaxed mt-2">
                                        <AlertCircle size={16} className="shrink-0 mt-0.5" />
                                        僅限本會同工註冊
                                    </div>
                                )}

                                <button type="submit" disabled={loading} className="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:opacity-95 disabled:from-indigo-400 disabled:to-violet-400 text-white font-medium py-3.5 rounded-lg shadow-button hover:-translate-y-0.5 transition-all duration-200 mt-4 text-base">
                                    {loading ? '處理中...' : (isSignUp ? '註冊' : '登入')}
                                </button>
                            </form>

                            <div className="mt-6 flex flex-col gap-4 text-center">
                                {isSignUp ? (
                                    <div className="text-sm font-medium text-slate-500">
                                        已有帳號？ <button type="button" onClick={() => { setIsSignUp(false); setErrorMsg(''); setConfirmPassword(''); setShowPassword(false); setShowConfirmPassword(false); }} className="font-bold text-indigo-600 hover:text-indigo-700 transition-colors py-1">登入</button>
                                    </div>
                                ) : (
                                    <div className="text-sm font-medium text-slate-500">
                                        沒有帳號？ <button type="button" onClick={() => { setIsSignUp(true); setErrorMsg(''); setConfirmPassword(''); setShowPassword(false); setShowConfirmPassword(false); }} className="font-bold text-indigo-600 hover:text-indigo-700 transition-colors py-1">建立一個吧！</button>
                                    </div>
                                )}
                                
                                {!isSignUp && (
                                    <div className="text-xs font-medium text-slate-400 pt-4 border-t border-slate-100/80">
                                        忘記密碼？請聯絡行政辦公室
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 主應用框架 (分流與路由守衛)
        // ==========================================
        const MainApp = ({ session }) => {
            const [isAdmin, setIsAdmin] = useState(false);
            const [isRoleChecking, setIsRoleChecking] = useState(true);
            const [currentApp, setCurrentApp] = useState('members'); 

            // --- 系統控制面板專用狀態 ---
            const [systemConfig, setSystemConfig] = useState({ current: true, next: false });
            const [nextButtonsConfig, setNextButtonsConfig] = useState(false);
            const [seasonLabels, setSeasonLabels] = useState({ current: '4-6月', next: '7-9月' });
            const [isUpdatingConfig, setIsUpdatingConfig] = useState(false);

            // 一登入就去資料庫 user_roles 查詢是否為管理員
            useEffect(() => {
                const checkUserRole = async () => {
                    if (!session?.user?.id) return;
                    try {
                        const { data, error } = await supabase
                            .from('user_roles')
                            .select('role')
                            .eq('user_uid', session.user.id)
                            .maybeSingle();

                        const userIsAdmin = data?.role === 'admin';
                        setIsAdmin(userIsAdmin);
                        setCurrentApp(userIsAdmin ? 'home' : 'members');
                    } catch (error) {
                        console.error('權限檢查失敗:', error);
                    } finally {
                        setIsRoleChecking(false);
                    }
                };
                checkUserRole();
            }, [session]);

            // 當回到管理員首頁時，讀取並初始化發布控制面板設定
            useEffect(() => {
                if (currentApp === 'home' && isAdmin) {
                    // 1. 動態計算當前季度與下一季度標籤
                    const d = new Date();
                    const month = d.getMonth() + 1;
                    let cur = '4-6月', nxt = '7-9月'; // 預設值
                    if (month >= 1 && month <= 3) { cur = '1-3月'; nxt = '4-6月'; }
                    else if (month >= 4 && month <= 6) { cur = '4-6月'; nxt = '7-9月'; }
                    else if (month >= 7 && month <= 9) { cur = '7-9月'; nxt = '10-12月'; }
                    else { cur = '10-12月'; nxt = '1-3月'; }
                    setSeasonLabels({ current: cur, next: nxt });

                    // 2. 從 members 撈取系統控制虛擬同工的狀態
                    const fetchConfig = async () => {
                        try {
                            const { data, error } = await supabase
                                .from('members')
                                .select('*')
                                .in('name', ['SYSTEM_CONFIG', 'SYSTEM_NEXT_BUTTONS']);
                            
                            if (!error && data) {
                                const conf = data.find(m => m.name === 'SYSTEM_CONFIG');
                                if (conf) {
                                    const status = conf.availability_status || 'CURRENT';
                                    setSystemConfig({
                                        current: status === 'BOTH' || status === 'CURRENT',
                                        next: status === 'BOTH' || status === 'NEXT'
                                    });
                                }
                                const btnConf = data.find(m => m.name === 'SYSTEM_NEXT_BUTTONS');
                                if (btnConf) {
                                    setNextButtonsConfig(btnConf.availability_status === 'ON');
                                }
                            }
                        } catch (err) {
                            console.error("讀取系統設定失敗:", err);
                        }
                    };
                    fetchConfig();
                }
            }, [currentApp, isAdmin]);

            // --- 發布控制面板切換邏輯 ---
            const handleToggleSystemConfig = async (target) => {
                setIsUpdatingConfig(true);
                const newConfig = { ...systemConfig, [target]: !systemConfig[target] };
                let dbStatus = 'NONE';
                if (newConfig.current && newConfig.next) dbStatus = 'BOTH';
                else if (newConfig.current) dbStatus = 'CURRENT';
                else if (newConfig.next) dbStatus = 'NEXT';

                try {
                    // 1. 更新主發布狀態
                    await supabase
                        .from('members')
                        .update({ availability_status: dbStatus })
                        .eq('name', 'SYSTEM_CONFIG');
                    
                    // 2. 防呆連動：如果關閉了「預排班表(next)」，自動將「功能按鈕」也設為關閉
                    if (target === 'next' && newConfig.next === false) {
                        await supabase
                            .from('members')
                            .update({ availability_status: 'OFF' })
                            .eq('name', 'SYSTEM_NEXT_BUTTONS');
                        setNextButtonsConfig(false); // 同步更新畫面狀態
                    }

                    setSystemConfig(newConfig);
                } catch (e) {
                    alert('班表更新失敗');
                } finally {
                    setIsUpdatingConfig(false);
                }
            };

            const handleToggleNextButtons = async () => {
                setIsUpdatingConfig(true);
                const newState = !nextButtonsConfig;
                const dbStatus = newState ? 'ON' : 'OFF';

                try {
                    await supabase
                        .from('members')
                        .update({ availability_status: dbStatus })
                        .eq('name', 'SYSTEM_NEXT_BUTTONS');
                    setNextButtonsConfig(newState);
                } catch (e) {
                    alert('按鈕擴充功能更新失敗');
                } finally {
                    setIsUpdatingConfig(false);
                }
            };

            const handleLogout = async () => { await supabase.auth.signOut(); window.location.reload(); };

            // 強制導航保護
            useEffect(() => {
                if (!isRoleChecking && !isAdmin && currentApp !== 'members') {
                    setCurrentApp('members');
                }
            }, [currentApp, isAdmin, isRoleChecking]);

            if (isRoleChecking) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center">
                        <div className="text-slate-500 font-medium animate-pulse">Laoding</div>
                    </div>
                );
            }

            if (currentApp === 'home' && isAdmin) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col relative overflow-y-auto custom-scrollbar">
                        <div className="absolute top-[10%] left-[5%] w-[40vw] h-[40vw] rounded-full bg-indigo-500/10 blur-[120px] pointer-events-none"></div>
                        <div className="absolute bottom-[10%] right-[5%] w-[40vw] h-[40vw] rounded-full bg-violet-500/10 blur-[120px] pointer-events-none"></div>

                        <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 sm:px-8 py-4 flex justify-between items-center shadow-sm shrink-0 relative z-20">
                            <div className="flex items-center gap-3"><Activity className="text-indigo-600" size={28} /><h1 className="text-lg sm:text-xl font-extrabold text-slate-900 tracking-tight">TBC Serve Manager</h1></div>
                            <button onClick={handleLogout} className="flex items-center gap-2 text-slate-500 hover:text-slate-800 font-normal px-3 sm:px-4 py-2 rounded-lg hover:bg-slate-100 transition-colors"><LogOut size={18} /> <span className="hidden sm:inline">Sign Out</span></button>
                        </header>
                        
                        <main className="flex-1 w-full max-w-6xl mx-auto px-4 sm:px-6 py-8 sm:py-12 animate-fade-in flex flex-col justify-start relative z-10">
                            <div className="mb-8 sm:mb-10 text-center sm:text-left">
                                <h2 className="text-3xl sm:text-5xl font-extrabold mb-3 tracking-tight text-slate-900">
                                    Welcome <span className="bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-600">back</span>
                                </h2>
                                <p className="text-slate-500 font-normal text-sm sm:text-base">Select a workspace to continue your management tasks.</p>
                            </div>
                            
                            {/* 三大中心工作卡片：手機版全寬自動垂直堆疊，桌機並排 */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 sm:gap-8 perspective-[2000px]">
                                <div onClick={() => setCurrentApp('members')} className="bg-white p-8 rounded-xl border border-slate-100 shadow-soft hover:shadow-hover-soft hover:-translate-y-1 transition-all duration-300 cursor-pointer group relative overflow-hidden transform hover:rotate-x-[2deg] hover:rotate-y-[-4deg]">
                                    <div className="absolute top-0 right-0 w-40 h-40 bg-gradient-to-bl from-indigo-50 to-transparent rounded-bl-full -z-10 transition-transform duration-500 group-hover:scale-110"></div>
                                    <div className="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center mb-8"><Users size={32} /></div>
                                    <h3 className="text-2xl font-extrabold text-slate-900 mb-10 tracking-tight">同工資料中心</h3>
                                    <div className="flex items-center gap-2 text-indigo-600 font-medium text-sm group-hover:translate-x-1 transition-transform duration-200">Enter Workspace <ArrowRight size={16} /></div>
                                </div>
                                <div onClick={() => setCurrentApp('scheduling')} className="bg-white p-8 rounded-xl border border-slate-100 shadow-soft hover:shadow-hover-soft hover:-translate-y-1 transition-all duration-300 cursor-pointer group relative overflow-hidden transform hover:rotate-x-[2deg] hover:rotate-y-[4deg]">
                                    <div className="absolute top-0 right-0 w-40 h-40 bg-gradient-to-bl from-violet-50 to-transparent rounded-bl-full -z-10 transition-transform duration-500 group-hover:scale-110"></div>
                                    <div className="w-16 h-16 bg-violet-50 text-violet-600 rounded-xl flex items-center justify-center mb-8"><Calendar size={32} /></div>
                                    <h3 className="text-2xl font-extrabold text-slate-900 mb-10 tracking-tight">排班作業中心</h3>
                                    <div className="flex items-center gap-2 text-violet-600 font-medium text-sm group-hover:translate-x-1 transition-transform duration-200">Enter Workspace <ArrowRight size={16} /></div>
                                </div>
                                <div onClick={() => setCurrentApp('insights')} className="bg-white p-8 rounded-xl border border-slate-100 shadow-soft hover:shadow-hover-soft hover:-translate-y-1 transition-all duration-300 cursor-pointer group relative overflow-hidden transform hover:rotate-x-[2deg] hover:rotate-y-[4deg]">
                                    <div className="absolute top-0 right-0 w-40 h-40 bg-gradient-to-bl from-sky-50 to-transparent rounded-bl-full -z-10 transition-transform duration-500 group-hover:scale-110"></div>
                                    <div className="w-16 h-16 bg-sky-50 text-sky-600 rounded-xl flex items-center justify-center mb-8"><BarChart3 size={32} /></div>
                                    <h3 className="text-2xl font-extrabold text-slate-900 mb-10 tracking-tight">人力洞察中心</h3>
                                    <div className="flex items-center gap-2 text-sky-600 font-medium text-sm group-hover:translate-x-1 transition-transform duration-200">Enter Workspace <ArrowRight size={16} /></div>
                                </div>
                            </div>

                            {/* 🛡️ 系統發布控制面板：位於核心模組下方 */}
                            <div className="mt-10 sm:mt-12 bg-white p-5 sm:p-6 md:p-8 rounded-[1.5rem] border border-slate-100 shadow-soft">
                                <div className="flex items-center gap-3 mb-6">
                                    <div className="bg-indigo-50 text-indigo-600 p-2.5 rounded-xl">
                                        <ShieldCheck size={24} strokeWidth={2.5} />
                                    </div>
                                    <div>
                                        <h3 className="text-lg sm:text-xl font-extrabold text-slate-900 tracking-tight">TBC主日服事查詢系統控制面板</h3>
                                        
                                    </div>
                                   
                                </div>

                                {/* 按鈕佈局：手機與平板垂直排列，大桌機橫向並排 */}
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                                    
                                    {/* 開關 1：服事班表 */}
                                    <button
                                        onClick={() => handleToggleSystemConfig('current')}
                                        disabled={isUpdatingConfig}
                                        type="button"
                                        className={`flex items-center justify-between p-4 sm:p-5 rounded-2xl border-2 transition-all duration-200 active:scale-95 text-left ${
                                            systemConfig.current
                                            ? 'border-blue-200 bg-blue-50 text-blue-700 hover:bg-blue-100/70 shadow-sm'
                                            : 'border-slate-100 bg-slate-50/80 text-slate-400 hover:bg-slate-100'
                                        }`}
                                    >
                                        <span className="font-bold text-base">服事班表 ({seasonLabels.current})</span>
                                        <div className="flex items-center gap-2 shrink-0">
                                            <div className={`w-2.5 h-2.5 rounded-full transition-colors ${systemConfig.current ? 'bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.8)]' : 'bg-slate-300'}`}></div>
                                            <span className="text-sm font-extrabold w-10 text-right">{systemConfig.current ? 'Open' : 'Close'}</span>
                                        </div>
                                    </button>

                                    {/* 開關 2：預排班表 */}
                                    <button
                                        onClick={() => handleToggleSystemConfig('next')}
                                        disabled={isUpdatingConfig}
                                        type="button"
                                        className={`flex items-center justify-between p-4 sm:p-5 rounded-2xl border-2 transition-all duration-200 active:scale-95 text-left ${
                                            systemConfig.next
                                            ? 'border-emerald-200 bg-emerald-50 text-emerald-700 hover:bg-emerald-100/70 shadow-sm'
                                            : 'border-slate-100 bg-slate-50/80 text-slate-400 hover:bg-slate-100'
                                        }`}
                                    >
                                        <span className="font-bold text-base">預排班表 ({seasonLabels.next})</span>
                                        <div className="flex items-center gap-2 shrink-0">
                                            <div className={`w-2.5 h-2.5 rounded-full transition-colors ${systemConfig.next ? 'bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.8)]' : 'bg-slate-300'}`}></div>
                                            <span className="text-sm font-extrabold w-10 text-right">{systemConfig.next ? 'Open' : 'Close'}</span>
                                        </div>
                                    </button>

                                    {/* 開關 3：加入行事曆/換班查詢 (僅在預排班表開啟時，動態滑出顯示) */}
                                    {systemConfig.next && (
                                        <button
                                            onClick={handleToggleNextButtons}
                                            disabled={isUpdatingConfig}
                                            type="button"
                                            className={`animate-fade-in flex items-center justify-between p-4 sm:p-5 rounded-2xl border-2 transition-all duration-200 active:scale-95 text-left ${
                                                nextButtonsConfig
                                                ? 'border-emerald-200 bg-emerald-50 text-emerald-700 hover:bg-emerald-100/70 shadow-sm'
                                                : 'border-slate-100 bg-slate-50/80 text-slate-400 hover:bg-slate-100'
                                            }`}
                                        >
                                            <span className="font-bold text-base">加入行事曆 / 換班查詢</span>
                                            <div className="flex items-center gap-2 shrink-0">
                                                <div className={`w-2.5 h-2.5 rounded-full transition-colors ${nextButtonsConfig ? 'bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.8)]' : 'bg-slate-300'}`}></div>
                                                <span className="text-sm font-extrabold w-10 text-right">{nextButtonsConfig ? 'Open' : 'Close'}</span>
                                            </div>
                                        </button>
                                    )}
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            const MemberDataCenterComp = window.MemberDataCenter;
            const SchedulingAndGovernanceComp = window.SchedulingAndGovernance;
            const TeamInsightsComp = window.TeamInsights;

            return (
                <div className="flex h-[100dvh] w-full bg-slate-50 overflow-hidden relative">
                    {/* 這裡改為 overflow-y-auto 與 custom-scrollbar，確保內容過長時可正常滾動 */}
                    <main className="flex-1 flex flex-col h-full overflow-y-auto custom-scrollbar relative z-10">
                        {currentApp === 'members' && (
                            MemberDataCenterComp 
                                ? <MemberDataCenterComp 
                                    session={session} 
                                    isAdmin={isAdmin} 
                                    goBack={isAdmin ? () => setCurrentApp('home') : handleLogout} 
                                    goToSchedule={() => setCurrentApp('scheduling')} 
                                    goToInsights={() => setCurrentApp('insights')} 
                                    supabase={supabase} 
                                    utils={utils} 
                                    constants={constants} 
                                  />
                                : <div className="flex-1 flex items-center justify-center font-medium text-slate-500 animate-pulse">Loading...</div>
                        )}
                        {currentApp === 'scheduling' && isAdmin && (
                            SchedulingAndGovernanceComp 
                                ? <SchedulingAndGovernanceComp 
                                    session={session} 
                                    goBack={() => setCurrentApp('home')} 
                                    goToMembers={() => setCurrentApp('members')} 
                                    goToInsights={() => setCurrentApp('insights')} 
                                    supabase={supabase} 
                                    utils={utils} 
                                    constants={constants} 
                                    StatCard={StatCard} 
                                  />
                                : <div className="flex-1 flex items-center justify-center font-medium text-slate-500 animate-pulse">Loading...</div>
                        )}
                        {currentApp === 'insights' && isAdmin && (
                            TeamInsightsComp 
                                ? <TeamInsightsComp 
                                    session={session} 
                                    goBack={() => setCurrentApp('home')} 
                                    goToMembers={() => setCurrentApp('members')} 
                                    goToSchedule={() => setCurrentApp('scheduling')} 
                                    supabase={supabase} 
                                    utils={utils} 
                                    constants={constants} 
                                    StatCard={StatCard} 
                                  />
                                : <div className="flex-1 flex items-center justify-center font-medium text-slate-500 animate-pulse">Loading...</div>
                        )}
                    </main>
                </div>
            );
        }

        // ==========================================
        // 系統進入點 App 
        // ==========================================
        function App() {
            const [session, setSession] = useState(null);
            const [isSessionLoaded, setIsSessionLoaded] = useState(false);
            
            useEffect(() => {
                supabase.auth.getSession().then(({ data: { session } }) => { 
                    setSession(session); setIsSessionLoaded(true); 
                });
                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => { 
                    setSession(session); setIsSessionLoaded(true); 
                });
                return () => subscription.unsubscribe();
            }, []);

            if (!isSessionLoaded) return <div className="min-h-screen bg-slate-50 flex items-center justify-center"><div className="text-slate-400 font-medium animate-pulse">Loading...</div></div>;
            if (!session) return <AuthScreen />;
            return <MainApp session={session} />;
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
